name: macOS build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm64:
    name: Build and smoke-test macOS ARM64
    runs-on: macos-15
    timeout-minutes: 45

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      QT_QPA_PLATFORM: "offscreen"
      MPLCONFIGDIR: "${{ github.workspace }}/.matplotlib-ci"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.14 ARM64
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          architecture: "arm64"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install locked dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -r requirements-lock.txt

      - name: Run automated tests
        run: python -m unittest discover -s tests -v

      - name: Build PyInstaller application bundle
        run: python -m PyInstaller --clean --noconfirm eis_macos.spec

      - name: Prepare tracked BioLogic smoke sample
        run: |
          sample="$(find swagelok_test -maxdepth 1 -type f -name '*3_C01.mpr' -print -quit)"
          test -n "$sample"
          cp "$sample" ci-biologic.mpr

      - name: Verify ad-hoc code signature
        run: codesign --verify --deep --strict --verbose=2 "dist/EIS Solver.app"

      - name: Run packaged release acceptance
        run: >-
          python eis_release_check.py
          --skip-tests
          --require-gcc
          --require-packaged
          --packaged-exe "dist/EIS Solver.app/Contents/MacOS/eis_qt"
          --biologic-sample "ci-biologic.mpr"
          --output "dist/release-passport-macos-arm64.json"

      - name: Archive application and record checksum
        id: checksum
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/EIS Solver.app" "dist/EIS-Solver-macOS-arm64.zip"
          hash="$(shasum -a 256 "dist/EIS-Solver-macOS-arm64.zip" | awk '{print toupper($1)}')"
          size="$(stat -f '%z' "dist/EIS-Solver-macOS-arm64.zip")"
          printf '%s  %s\n' "$hash" "EIS-Solver-macOS-arm64.zip" \
            > "dist/SHA256SUMS-macOS-arm64.txt"
          echo "sha256=$hash" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"

      - name: Publish build summary
        run: |
          echo "## EIS Solver macOS ARM64" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python: \`3.14 ARM64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Signature: \`ad-hoc (not notarized)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ZIP SHA-256: \`${{ steps.checksum.outputs.sha256 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ZIP size: \`${{ steps.checksum.outputs.size }}\` bytes" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests, TXT smoke, BioLogic MPR smoke, GCC and release metadata: passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS application artifact
        uses: actions/upload-artifact@v7
        with:
          name: eis-solver-macos-arm64-${{ github.sha }}
          path: |
            dist/EIS-Solver-macOS-arm64.zip
            dist/SHA256SUMS-macOS-arm64.txt
            dist/release-passport-macos-arm64.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
